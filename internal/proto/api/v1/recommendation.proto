    google.protobuf.Timestamp updated_at = 9;
    map<string, string> cluster_names = 10;  // cluster_id → display name

    // Scheduling & Triggers
    repeated ActionTrigger action_triggers = 11;
    optional string cron_schedule = 12;
    optional int32 cooldown_minutes = 13;
    repeated WorkloadDetectionTrigger detection_triggers = 14;

    // Scheduler Optimization
    repeated string scheduler_plugins = 15;
    optional string defragmentation_schedule = 16;
    bool live_migration_enabled = 17;
    bool use_in_place_vertical_scaling = 18;

    // HPA: when true, WorkloadRules generated from this policy have HPA
    // enabled. Two-way bound to HPARuleConfig.Enabled on the WorkloadRule CRD.
    bool hpa_enabled = 19;
}

