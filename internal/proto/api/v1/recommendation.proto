// WorkloadRule proto messages for MPA v2 rules-based architecture
message WorkloadRule {
    string rule_id = 1;
    string cluster_id = 2;
    string namespace = 3;
    string kind = 4;
    string name = 5;

    ResourceRuleConfig cpu_rule = 10;
    ResourceRuleConfig memory_rule = 11;
    ResourceRuleConfig gpu_rule = 12;
    HPARuleConfig hpa_rule = 13;

    int64 generation = 20;
    string version = 21;
    double confidence_score = 22;
    bool outlier_detection_enabled = 23;

    repeated ActionTrigger action_triggers = 30;
    optional int64 startup_period_seconds = 31;
    optional string cron_schedule = 32;
    optional int32 cooldown_minutes = 33;
    repeated WorkloadDetectionTrigger detection_triggers = 34;
    repeated string scheduler_plugins = 35;
    optional string defragmentation_schedule = 36;
    bool live_migration_enabled = 37;

    // PolicyID is the UUID of the policy that generated this rule
    optional string policy_id = 40;

    EmergencyResponseConfig emergency_response = 50;

    // Pre-computed percentiles per resource axis from control plane
    ResourcePercentiles percentiles = 60;

    // Workload classification (dominance + burstiness)
    WorkloadClassification classification = 61;

    // Whether the rule evaluator should create recommendations that use
    // in-place pod vertical scaling instead of triggering pod restarts.
    bool use_in_place_vertical_scaling = 70;

    // UI display fields (not sent to cluster, only used for listing)
    string status = 80;                // "active" or "inactive"
    string sync_status = 81;           // "pending", "synced", or "failed"
    string current_source = 82;        // "crd", "policy", "auto_optimization", "manual"
    google.protobuf.Timestamp created_at = 83;
    google.protobuf.Timestamp updated_at = 84;

    // Per-container resource configurations (VPA). When empty, workload-level rules apply to all containers.
    repeated ContainerResourceRuleConfig containers = 90;
}

message ResourceRuleConfig {
    bool enabled = 1;
    int64 base_request = 2;
    optional int64 min_request = 3;
    optional int64 max_request = 4;
    optional float limit_multiplier = 5;
    bool limits_adjustment_enabled = 6;
    optional float target_percentile = 7;
    optional float max_scale_up_percent = 8;
    optional float max_scale_down_percent = 9;
    // Pmax spike protection output
    bool pmax_protection_active = 10;
    int64 pmax_value = 11;
    optional float pmax_ratio = 12;

    // Whether to actively remove limits from workloads.
    bool limits_removal_enabled = 13;
}

message HPAMetricTrigger {
    string type = 1;                          // "CPU", "Memory", "NetworkIngress", "NetworkEgress"
    optional string target_utilization = 2;    // "0.70" for resource metrics
    optional string target_value = 3;          // "50000000" for absolute metrics (bytes/sec)
    optional string weight = 4;                // "0.5" for composite formula
}

// HPABehavior, HPAScalingRules, HPAScalingPolicy are defined in common.proto
message HPAFallback {
    int32 replicas = 1;
    string behavior = 2;                        // "static", "currentReplicas", "currentReplicasIfHigher", "currentReplicasIfLower"
    int32 failure_threshold = 3;
}

// Per-container resource config (core subset: enabled + request bounds + limits).
message ContainerResourceConfig {
    bool enabled = 1;
    int64 base_request = 2;
    optional int64 min_request = 3;
    optional int64 max_request = 4;
    optional float limit_multiplier = 5;
    bool limits_adjustment_enabled = 6;
    bool limits_removal_enabled = 7;
    // Engine-selected target percentile for this container (0.0–1.0).
    // Carried so the UI can surface profiling's per-container percentile
    // pick alongside the workload-level chip.
    optional float target_percentile = 8;
}

// Per-container resource rule config with CPU/Memory/GPU.
message ContainerResourceRuleConfig {
    string container_name = 1;
    ContainerResourceConfig cpu_rule = 2;
    ContainerResourceConfig memory_rule = 3;
    ContainerResourceConfig gpu_rule = 4;
}

message HPARuleConfig {
    bool enabled = 1;
    optional int32 min_replicas = 2;
    optional int32 max_replicas = 3;
    optional float target_utilization = 4;
    optional HPAMetricType primary_metric = 5;
    optional float max_replica_change_percent = 6;
    repeated HPAMetricTrigger metrics = 7;
    optional HPABehavior behavior = 8;
    optional string composite_formula = 9;
    optional HPAFallback fallback = 10;
    optional int32 scale_down_cooldown_seconds = 11;
    // Target memory utilization (0.0-1.0). Separate from target_utilization (CPU)
    // to allow independent tuning per resource.
    optional float target_memory_utilization = 12;
}

message EmergencyResponseConfig {
    bool oom_enabled = 1;
    float oom_memory_multiplier = 2;
    int32 oom_max_reactions = 3;
    int32 oom_cooldown_seconds = 4;
    bool cpu_throttling_enabled = 5;
    float cpu_throttling_threshold = 6;
    float cpu_throttling_multiplier = 7;
}

// PercentileValues contains pre-computed percentile values for a single resource axis
message PercentileValues {
    int64 p50 = 1;
    int64 p80 = 2;
    int64 p90 = 3;
    int64 p95 = 4;
    int64 p99 = 5;
}

// ResourcePercentiles contains percentile sets for all resource axes
message ResourcePercentiles {
    PercentileValues cpu = 1;
    PercentileValues memory = 2;
    PercentileValues network = 3;
    PercentileValues disk = 4;
}

// BurstinessRatios contains the p95/p50 ratio for each resource axis
message BurstinessRatios {
    double cpu = 1;
    double memory = 2;
    double network = 3;
    double disk = 4;
    double pmax_cpu = 5;   // pmax/p50 ratio for CPU (spike severity)
    double pmax_mem = 6;   // pmax/p50 ratio for memory (spike severity)
}

// WorkloadClassification contains workload classification based on resource dominance and burstiness
message WorkloadClassification {
    string dominant_resource = 1;  // cpu, memory, gpu, network, disk, unknown
    BurstinessRatios burstiness = 2;
}

message BatchWorkloadRules {
    repeated WorkloadRule rules = 1;
    repeated string rule_ids_to_delete = 2;  // rule IDs whose CRDs should be deleted from cluster
}

