// LiveMigrationResult provides structured metadata about a live migration attempt.
message LiveMigrationResult {
    // Whether the migration was degraded (restore failed, fell back to cold start).
    // When true, success on parent message is still true (resources are applied).
    bool degraded = 1;
    // Which stage failed: "checkpoint" or "restore". Empty if no failure.
    string failure_stage = 2;
    // Duration of the checkpoint operation in milliseconds.
    int64 checkpoint_duration_ms = 3;
    // Duration of the restore operation in milliseconds (0 if restore was not attempted or failed).
    int64 restore_duration_ms = 4;
    // The node where the checkpoint was created.
    string source_node = 5;
    // The node where the restore was attempted (may differ for cross-node migration).
    string target_node = 6;
    // Checkpoint image size in bytes.
    int64 checkpoint_size_bytes = 7;
}

